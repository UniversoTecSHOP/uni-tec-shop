# automacao.yml — agenda o script pra rodar sozinho no GitHub.
#
# ⚠️ ESQUELETO: propositalmente sem o gatilho de agendamento ativo ainda,
# pra não rodar antes da API estar liberada. Quando estiver tudo pronto,
# a gente ativa o "schedule".

name: Atualizar produtos Universo Tec

on:
  workflow_dispatch:   # por enquanto: só roda manualmente, apertando um botão
  # schedule:
  #   - cron: '0 9 * * *'   # (desligado) rodaria todo dia às 9h UTC

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar bibliotecas
        run: pip install -r requirements.txt

