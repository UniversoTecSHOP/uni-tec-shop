name: Atualizar produtos Universo Tec

on:
  workflow_dispatch:        # permite rodar manualmente pelo botão
  schedule:
    - cron: '0 9 * * *'     # todo dia às 9h UTC (6h no horário de Brasília)

permissions:
  contents: write           # necessário para o bot commitar o site atualizado

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar bibliotecas
        run: pip install -r requirements.txt

      - name: Coletar produtos da Shopee
        env:
          SHOPEE_APP_ID: ${{ secrets.SHOPEE_APP_ID }}
          SHOPEE_APP_SECRET: ${{ secrets.SHOPEE_APP_SECRET }}
        run: python scripts/coletar.py

      - name: Gerar o site
        run: python scripts/gerar_site.py

      - name: Publicar as mudanças
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dados/produtos.json index.html
          git diff --staged --quiet || git commit -m "Atualiza produtos automaticamente"
          git push
